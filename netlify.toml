[build]
  command = "npm install && npm run build"
  publish = "dist"

[[redirects]]
  from  = "/api/*"
  to    = "https://dpdp-api-production.up.railway.app/api/:splat"
  status = 200
  force  = true

# ↓ MORE SPECIFIC — must be BEFORE /c/*
[[redirects]]
  from   = "/c/*/withdraw/*"
  to     = "/index.html"
  status = 200

# ↓ LESS SPECIFIC — catches all other /c/ paths after withdraw is handled
[[redirects]]
  from   = "/c/*"
  to     = "/c/:splat"
  status = 200

[[redirects]]
  from   = "/withdraw/*"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
