[build]
  command = "npm install && npm run build"
  publish = "dist"

# Proxy /api/* to the Docker backend — fixes mobile "Failed to fetch"
# Mobile calls dpdpaudits.in/api/... → Netlify forwards to the actual backend
# Must come FIRST so it takes priority over the SPA catch-all
[[redirects]]
  from   = "/api/*"
  to     = "https://dpdp-api-production.up.railway.app/api/:splat"
  status = 200
  force  = true

# Static consent pages — served directly from dist/c/<shopId>/
[[redirects]]
  from   = "/c/*"
  to     = "/c/:splat"
  status = 200

[[redirects]]
  from   = "/withdraw/*"
  to     = "/withdraw/:splat"
  status = 200

# SPA catch-all (React Router) — must be LAST
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
