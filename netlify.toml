[build]
  command = "npm install && npm run build"
  publish = "dist"

# Proxy /api/* to Railway backend — same-origin for all devices, no CORS issues
[[redirects]]
  from   = "/api/*"
  to     = "https://dpdp-api-production.up.railway.app/api/:splat"
  status = 200
  force  = true

# Static consent AND withdrawal pages live under /c/<shopId>/
# Both served directly from dist/c/<shopId>/ — no React app needed
# /c/1005/            → consent form   (dist/c/1005/index.html)
# /c/1005/withdraw/   → withdrawal form (dist/c/1005/withdraw/index.html)
[[redirects]]
  from   = "/c/*"
  to     = "/c/:splat"
  status = 200

# React SPA catch-all — merchant dashboard, school pages, etc.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
