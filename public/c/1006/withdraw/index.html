<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#dc2626">
  <title>Withdraw Consent — Raghu condomints</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 40px}
    .wrap{max-width:420px;width:100%}
    .header{background:linear-gradient(135deg,#7f1d1d,#dc2626);border-radius:0 0 20px 20px;padding:20px;text-align:center;margin:-20px -16px 20px;box-shadow:0 4px 20px rgba(220,38,38,.35)}
    .card{background:#fff;border-radius:16px;padding:22px;box-shadow:0 4px 24px rgba(0,0,0,.08);margin-bottom:14px}
    .inp{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:16px;font-family:inherit;outline:none;background:#f8fafc;margin-top:6px}
    .inp:focus{border-color:#dc2626;background:#fff}
    .btn{width:100%;padding:14px;border-radius:12px;border:none;font-weight:700;font-size:15px;font-family:inherit;cursor:pointer}
    .btn-danger{background:#dc2626;color:#fff;margin-bottom:10px}
    .btn-danger:disabled{background:#cbd5e1;cursor:not-allowed}
    .btn-ghost{background:#fff;color:#64748b;border:1.5px solid #e2e8f0;font-size:13px}
    .err{background:#fef2f2;border-radius:10px;padding:10px 14px;color:#dc2626;font-size:13px;margin-bottom:12px}
    .rights{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:12px;padding:14px;margin-bottom:16px;font-size:12px;color:#374151;line-height:1.8}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div style="font-size:11px;font-weight:700;letter-spacing:2px;color:#fca5a5;margin-bottom:4px">🛡️ DPDP ACT 2023 — SEC. 6</div>
    <div style="font-size:18px;font-weight:800;color:#fff">Raghu condomints</div>
    <div style="font-size:12px;color:#fca5a5;margin-top:4px">Withdraw Your Consent</div>
    <div style="display:inline-block;margin-top:8px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fee2e2;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:1px">SHOP #1006</div>
  </div>

  <div id="screen"></div>
</div>

<script>
var S = { phone:'', loading:false, error:'', result:null };

function render() {
  var sc = document.getElementById('screen');
  if (!sc) return;
  if (S.result) { sc.innerHTML = renderSuccess(); return; }
  sc.innerHTML = renderForm();
}

function renderForm() {
  return '<div class="card">' +
    '<div class="rights"><strong style="color:#1d4ed8">⚖️ Your Rights — DPDP Act 2023, Section 6:</strong><br>' +
    '• Withdraw consent at any time without giving a reason<br>' +
    '• Data processing stops immediately on withdrawal<br>' +
    '• Historical audit records are maintained as required by law</div>' +
    '<label style="font-size:13px;font-weight:600;color:#374151;display:block">Your registered Mobile Number <span style="color:#dc2626">*</span>' +
    '<input class="inp" id="inp-phone" type="tel" placeholder="+91 98765 43210" value="' + S.phone + '" oninput="S.phone=this.value" autocomplete="tel"></label>' +
    (S.error ? '<div class="err" style="margin-top:12px">⚠️ ' + S.error + '</div>' : '') +
    '<div style="margin-top:16px">' +
    '<button class="btn btn-danger" ' + (!S.phone.trim() || S.loading ? 'disabled' : '') + ' onclick="doWithdraw()">' +
    (S.loading ? '<span class="spin"></span>Processing…' : '↩️ Withdraw My Consent') + '</button>' +
    '<a href="../" class="btn btn-ghost" style="display:block;text-align:center;text-decoration:none;padding:11px">← Back to Consent Page</a>' +
    '</div></div>';
}

function renderSuccess() {
  var r = S.result;
  var html = '<div class="card" style="text-align:center">' +
    '<div style="font-size:52px;margin-bottom:12px">✅</div>' +
    '<div style="font-weight:800;font-size:20px;color:#166534;margin-bottom:8px">Consent Withdrawn!</div>' +
    '<div style="font-size:13px;color:#374151;line-height:1.6;margin-bottom:20px">' +
    r.withdrawn + ' consent record' + (r.withdrawn > 1 ? 's' : '') + ' withdrawn immediately from <strong>Raghu condomints</strong>.</div>';
  if (r.consents && r.consents.length) {
    r.consents.forEach(function(c) {
      html += '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:12px 16px;margin-bottom:10px;text-align:left">' +
        '<div style="font-family:monospace;font-size:11px;color:#94a3b8;margin-bottom:4px">' + c.id + '</div>' +
        '<div style="font-size:12px;color:#374151">Purposes: ' + c.purposes + '</div>' +
        '<div style="font-size:11px;color:#dc2626;margin-top:4px">Withdrawn: ' + new Date(c.withdrawnAt).toLocaleString('en-IN') + '</div>' +
        '</div>';
    });
  }
  html += '<div style="font-size:11px;color:#94a3b8;margin-top:8px">DPDP Act 2023, Section 6 · Shop #1006</div></div>';
  return html;
}

async function doWithdraw() {
  var phone = (document.getElementById('inp-phone') && document.getElementById('inp-phone').value.trim()) || S.phone.trim();
  if (!phone) return;
  S.loading = true; S.error = ''; S.phone = phone; render();
  try {
    var res = await fetch('/api/consents/withdraw', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone, shopId: 1006 })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Withdrawal failed');
    S.loading = false; S.result = data; render();
  } catch(e) {
    S.loading = false; S.error = e.message; render();
  }
}

render();
</script>
</body>
</html>
